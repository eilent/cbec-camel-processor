# RabbitMQ配置
rabbitmq:
  host: 192.168.111.105
  port: 5672
  username: cbec
  password: cbec@2026
  virtual-host: cbec

# Kafka配置
kafka:
  # Kafka集群服务器地址，多个地址用逗号分隔
  bootstrap-servers: 192.168.120.8:9092,192.168.120.9:9092,192.168.120.10:9092
  # Kafka消费者配置
  consumer:
    # 消费者组ID
    group-id: cbec-consumer-group
    # 偏移量重置策略，earliest表示从最早的消息开始消费
    auto-offset-reset: earliest
    # 是否自动提交偏移量，false表示手动提交
    enable-auto-commit: false
    # 键反序列化器
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    # 值反序列化器
    value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  # Kafka生产者配置
  producer:
    # 键序列化器
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    # 值序列化器
    value-serializer: org.apache.kafka.common.serialization.StringSerializer
    # 生产者确认机制，all表示所有副本都确认
    acks: all

# 企业消息配置
enterprise:
  msg:
    # RabbitMQ配置
    rabbitmq:
      # 交换器名称
      exchange: ex_enterprise_mq
      # 交换器类型
      exchange-type: topic
      # 死信队列名称
      dlx-queue: queue_enterprise_dlx
      # 未知消息类型队列名称
      unknown-queue: queue_enterprise_unknown
      # RabbitMQ消费者配置
      consumer:
        # 是否自动声明队列，false表示队列已存在
        declare: false
        # 队列是否持久化
        durable: true
        # 是否自动确认消息
        auto-ack: false
        # 并发消费者数量
        concurrent-consumers: 5
        # 每个消费者预取消息数量
        prefetch-count: 2
        # 消费者请求超时时间（毫秒）
        request-timeout: 30000
    # Kafka配置
    kafka:
      # Kafka消息key构建配置
      key:
        # 消息头中SenderID的字段名
        header-sender-id: SenderID
        # 消息头中MessageType的字段名
        header-message-type: MessageType
        # 消息头中MessageID的字段名
        header-message-id: MessageID
        # 构建key时的分隔符
        separator: "-"
      # Kafka主题配置
      topic:
        # 订单消息主题
        order: cbec_topic_order
        # 运单消息主题
        waybill: cbec_topic_waybill
        # 支付消息主题
        payment: cbec_topic_payment 
    # 消息类型配置
    message-type:
      # 订单消息类型
      order: CBEC001
      # 运单消息类型
      waybill: CBEC002
      # 支付消息类型
      payment: CBEC003

# Camel配置
camel:
  springboot:
    name: CBECMessageRouter
    main-run-controller: true

# 服务配置
server:
  port: 8080
  servlet:
    context-path: /

# 日志配置
logging:
  level:
    root: info
    com.enterprise.msg: debug
